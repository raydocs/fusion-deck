<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc"><title id="title">fusion-deck — one question, independent answers, judged synthesis</title><desc id="desc">Three model cards converge on a judged answer with an honest runtime manifest.</desc><rect width="1200" height="460" rx="26" fill="#0C1020"/><circle cx="1100" cy="55" r="110" fill="#171C34"/><g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif"><text x="58" y="66" font-size="13" letter-spacing="4" fill="#828DB5">CLAUDE CODE DECISION &amp; EXECUTION TOOLKIT</text><text x="56" y="143" font-size="62" font-weight="800" fill="#F2F4FF">fusion-deck</text><text x="58" y="185" font-size="22" fill="#A8B1D4">一桌模型，各自作答；一个评审，给出结论。</text><text x="58" y="224" font-size="16" fill="#747FA7">Panel when risk warrants it. Single-model workflows when it does not.</text></g>
